server {
    # 监听端口由 PORT 环境变量控制（Zeabur 默认期望 8080），默认 80
    # ${NGINX_PORT} 由 entrypoint.sh 从 $PORT 注入
    listen ${NGINX_PORT};
    server_name _;
    client_max_body_size 20M;

    # DNS 解析器（K8s kube-dns / Zeabur 内部 DNS）
    # ${RESOLVER} 由 entrypoint.sh 从 /etc/resolv.conf 提取后注入
    # 用变量方式 proxy_pass 时，nginx 请求时通过 resolver 解析主机名
    resolver ${RESOLVER} valid=30s ipv6=off;

    # 后端地址变量化，避免 nginx 启动时硬解析失败导致 emerg 退出
    # ${NEW_API_URL} 由 entrypoint.sh 替换为实际后端地址
    set $backend "${NEW_API_URL}";

    # 后端是 HTTPS 时必须启用 SNI，否则 Cloudflare/Zeabur SSL 网关无法识别目标服务
    # ${BACKEND_SCHEME} 和 ${BACKEND_HOST} 由 entrypoint.sh 从 NEW_API_URL 提取
    proxy_ssl_server_name on;
    proxy_ssl_name "${BACKEND_HOST}";
    # 当后端是 HTTPS 时启用验证；HTTP 时这两项被 nginx 忽略
    proxy_ssl_verify off;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 前端 SPA（Vue 3 静态托管）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # new-api 管理接口（/api/*）— Session Token 认证
    # 用 $backend 变量，nginx 请求时通过 resolver 动态解析
    # Host 设成后端域名，让 Zeabur 路由层能识别转发目标
    location /api/ {
        proxy_pass $backend/api/;
        proxy_set_header Host "${BACKEND_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # new-api Relay 接口（/v1/*）— OpenAI 兼容，API Key 认证
    location /v1/ {
        proxy_pass $backend/v1/;
        proxy_set_header Host "${BACKEND_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
