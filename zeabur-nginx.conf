server {
    # 固定监听 80 端口。Zeabur 入口网关会自动检测 EXPOSE 或常见端口。
    # 不要用变量 listen，Zeabur 的 PORT 环境变量可能是变量引用字符串（如 ${WEB_PORT}）
    # 会导致 nginx 把它当主机名解析失败。
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # DNS 解析器（K8s kube-dns / Zeabur 内部 DNS）
    # ${RESOLVER} 由 entrypoint.sh 从 /etc/resolv.conf 提取后注入
    # 用变量方式 proxy_pass 时，nginx 请求时通过 resolver 解析主机名
    resolver ${RESOLVER} valid=30s ipv6=off;

    # 后端地址变量化，避免 nginx 启动时硬解析失败导致 emerg 退出
    # ${NEW_API_URL} 由 entrypoint.sh 替换为实际后端地址（不含路径）
    set $backend "${NEW_API_URL}";

    # 后端是 HTTPS 时必须启用 SNI，否则 Cloudflare/Zeabur SSL 网关无法识别目标服务
    # ${BACKEND_SCHEME} 和 ${BACKEND_HOST} 由 entrypoint.sh 从 NEW_API_URL 提取
    proxy_ssl_server_name on;
    proxy_ssl_name "${BACKEND_HOST}";
    # 当后端是 HTTPS 时启用验证；HTTP 时这两项被 nginx 忽略
    proxy_ssl_verify off;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 前端 SPA（Vue 3 静态托管）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # new-api 管理接口（/api/*）— Session Token 认证
    # 关键：用 rewrite + break + proxy_pass $backend（不带路径！）
    # 因为 proxy_pass 用变量时，nginx 不会自动按 location 前缀重写 URI，
    # 必须显式 rewrite 去掉前缀，否则路径会变成 /api/api/status 导致 404 → 回退到管理界面 HTML
    location /api/ {
        rewrite ^/api/(.*)$ /api/$1 break;
        proxy_pass $backend;
        proxy_set_header Host "${BACKEND_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # new-api Relay 接口（/v1/*）— OpenAI 兼容，API Key 认证
    location /v1/ {
        rewrite ^/v1/(.*)$ /v1/$1 break;
        proxy_pass $backend;
        proxy_set_header Host "${BACKEND_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
