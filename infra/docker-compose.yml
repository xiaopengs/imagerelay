version: '3.8'
services:
  one-api:
    image: justsong/one-api:latest
    container_name: imagerelay-one-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./one-api-data:/data

  nginx:
    image: nginx:alpine
    container_name: imagerelay-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - one-api